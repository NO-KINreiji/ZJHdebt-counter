<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZJH借金カウンター</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg-color: #1a1e24;
    --panel-bg: #252b35;
    --text-color: #e2e8f0;
    --text-muted: #94a3b8;
    --accent-color: #6366f1;
    --accent-hover: #4f46e5;
    --danger-color: #ef4444;
    --danger-hover: #dc2626;
    --success-color: #10b981;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: var(--bg-color);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    padding: 20px;
}

.container{
    max-width: 800px;
    margin: 40px auto;
    width: 100%;
}

h1{
    text-align: center;
    font-size: 1.8rem;
    color: var(--text-color);
    margin-bottom: 30px;
    font-weight: 600;
    letter-spacing: 0.05em;
}

h2 {
    font-size: 1.3rem;
    margin-bottom: 20px;
    color: var(--text-color);
    border-left: 4px solid var(--accent-color);
    padding-left: 10px;
}

#totalDisplay{
    text-align: center;
    background: var(--panel-bg);
    padding: 40px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    margin-bottom: 30px;
}

.total-label {
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-bottom: 15px;
    display: block;
}

.total-amount {
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    font-weight: 800;
    color: var(--text-color);
    line-height: 1.2;
    word-break: break-all;
}

/* ボタン共通設定 */
button{
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    background: var(--accent-color);
    color: #fff;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

button:hover{
    background: var(--accent-hover);
    transform: translateY(-1px);
}

button.btn-secondary {
    background: #38414f;
    color: var(--text-color);
}
button.btn-secondary:hover {
    background: #475366;
}

button.btn-danger {
    background: var(--danger-color);
}
button.btn-danger:hover {
    background: var(--danger-hover);
}

.button-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
}

.panel{
    background: var(--panel-bg);
    border-radius: 20px;
    padding: 30px;
    margin-top: 20px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
    display: none;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

input, select{
    width: 100%;
    padding: 14px;
    margin: 10px 0 20px 0;
    border: 2px solid #38414f;
    border-radius: 12px;
    font-size: 16px;
    background: #1a1e24;
    color: #fff;
    transition: border-color 0.2s;
}

input:focus {
    outline: none;
    border-color: var(--accent-color);
}

#adminControls{
    display: none;
    margin-top: 30px;
    padding-top: 30px;
    border-top: 1px solid #38414f;
}

/* レスポンシブテーブル設計 */
.history-container{
    margin-top: 15px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #38414f;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th, td{
    padding: 16px;
    text-align: left;
    font-size: 15px;
}

th {
    background: #1a1e24;
    color: var(--text-muted);
    font-weight: 600;
}

tr {
    border-bottom: 1px solid #38414f;
}

tr:last-child {
    border-bottom: none;
}

.status-paid{
    color: var(--success-color);
    font-weight: 600;
}

.status-unpaid{
    color: var(--danger-color);
    font-weight: 600;
}

/* 自作カスタム確認ダイアログ(モーダル) */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}
.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}
.modal-box {
    background: var(--panel-bg);
    padding: 30px;
    border-radius: 20px;
    max-width: 450px;
    width: 90%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.2s ease;
}
.modal-overlay.active .modal-box {
    transform: translateY(0);
}
.modal-text {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 25px;
    white-space: pre-wrap;
}
.modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
}

/* トースト通知 (画面上部にふわっと出るお知らせ) */
.toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #2e3846;
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid #475569;
}
.toast-container.active {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* モバイル向けカードUI変換 (スマホ表示) */
@media(max-width: 650px) {
    body { padding: 12px; }
    .container { margin: 10px auto; }
    .panel { padding: 20px; }
    
    table, thead, tbody, th, td, tr { 
        display: block; 
    }
    thead tr { 
        position: absolute; 
        top: -9999px; 
        left: -9999px; 
    }
    tr { 
        border: 1px solid #38414f; 
        border-radius: 12px; 
        margin-bottom: 15px; 
        padding: 10px;
        background: #1a1e24;
    }
    td { 
        border: none;
        position: relative;
        padding-left: 45%; 
        text-align: right;
        padding-top: 10px;
        padding-bottom: 10px;
    }
    td:before { 
        position: absolute;
        top: 10px;
        left: 12px;
        width: 40%; 
        padding-right: 10px; 
        white-space: nowrap;
        text-align: left;
        font-weight: 600;
        color: var(--text-muted);
    }
    td:nth-of-type(1):before { content: "日付"; }
    td:nth-of-type(2):before { content: "金額"; }
    td:nth-of-type(3):before { content: "用途"; }
    td:nth-of-type(4):before { content: "状態"; }
    td:nth-of-type(5):before { content: "操作"; }
    
    td button {
        width: 100%;
        margin-bottom: 5px;
    }
    .modal-buttons {
        flex-direction: column-reverse;
    }
    .modal-buttons button {
        width: 100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>ZJH借金カウンター</h1>

    <div id="totalDisplay">
        <span class="total-label">ZJHが俺にしている借金は</span>
        <span class="total-amount" id="amountSpan">読み込み中...</span>
    </div>

    <div class="button-group">
        <button class="btn-secondary" onclick="toggleHistory()">内訳確認</button>
        <button class="btn-secondary" onclick="toggleAdmin()">管理者モード</button>
    </div>

    <div id="historyPanel" class="panel">
        <h2>内訳一覧</h2>
        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>金額</th>
                        <th>用途</th>
                        <th>状態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="panel">
        <h2>管理者ログイン</h2>
        <input type="password" id="adminPassword" placeholder="パスワードを入力してください">
        <button onclick="loginAdmin()">ログイン</button>

        <div id="adminControls">
            <h2>借金データの追加</h2>
            <label style="color:var(--text-muted);">日付</label>
            <input type="date" id="dateInput">
            <label style="color:var(--text-muted);">金額 (円)</label>
            <input type="number" id="amountInput" placeholder="例: 5000">
            <label style="color:var(--text-muted);">用途</label>
            <input type="text" id="reasonInput" placeholder="例: 居酒屋の代わり、ゲーム代">
            <button onclick="addDebt()" style="width: 100%;">この内容で保存する</button>
        </div>
    </div>

</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <div id="modalText" class="modal-text"></div>
        <div class="modal-buttons">
            <button id="modalCancelBtn" class="btn-secondary">キャンセル</button>
            <button id="modalConfirmBtn">確定</button>
        </div>
    </div>
</div>

<div id="toast" class="toast-container"></div>

<script>
// --- configuration ---
const CONFIG_URL = "https://cjbwqutwvymejgsdnjzf.supabase.co";
const CONFIG_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqYndxdXR3dnltZWpnc2RuanpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTgyMjIsImV4cCI6MjA5NjM3NDIyMn0.C20QTlycDBvgfMjwAGaPQ1VLhlPj0iGA3C3xYi463bs";
const ADMIN_PASSWORD = "zjhkanekaesanai";

let supabaseClient = null;
let isAdminLoggedIn = false; 

try {
    if (window.supabase && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(CONFIG_URL, CONFIG_KEY);
    } else {
        document.getElementById("amountSpan").innerText = "エラー";
    }
} catch (e) {
    console.error("Supabase初期化エラー:", e);
}

// 邪魔なチェックボックスを出さない自作確認画面
function showCustomConfirm(message, isDangerAction = false) {
    return new Promise((resolve) => {
        const modal = document.getElementById("customModal");
        const textZone = document.getElementById("modalText");
        const confirmBtn = document.getElementById("modalConfirmBtn");
        const cancelBtn = document.getElementById("modalCancelBtn");

        textZone.innerText = message;
        confirmBtn.className = isDangerAction ? "btn-danger" : "";
        modal.classList.add("active");

        const cleanup = (result) => {
            modal.classList.remove("active");
            confirmBtn.onclick = null;
            cancelBtn.onclick = null;
            resolve(result);
        };

        confirmBtn.onclick = () => cleanup(true);
        cancelBtn.onclick = () => cleanup(false);
    });
}

// ブラウザのalertを使わずに自動で消えるメッセージ通知
function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    
    if(type === "error") {
        toast.style.borderColor = "var(--danger-color)";
        toast.style.color = "var(--danger-color)";
    } else {
        toast.style.borderColor = "var(--success-color)";
        toast.style.color = "var(--success-color)";
    }

    toast.classList.add("active");

    setTimeout(() => {
        toast.classList.remove("active");
    }, 2500); // 2.5秒後に自動消去
}

// パネル表示トグル
function toggleHistory(){
    const panel = document.getElementById("historyPanel");
    if(!panel) return;
    const isBlock = window.getComputedStyle(panel).display === "block";
    panel.style.display = isBlock ? "none" : "block";
    if(!isBlock) {
        loadHistory();
    }
}

function toggleAdmin(){
    const panel = document.getElementById("adminPanel");
    if(!panel) return;
    const isBlock = window.getComputedStyle(panel).display === "block";
    panel.style.display = isBlock ? "none" : "block";
}

function loginAdmin(){
    const pass = document.getElementById("adminPassword").value;
    if(pass === ADMIN_PASSWORD){
        isAdminLoggedIn = true;
        document.getElementById("adminControls").style.display = "block";
        showToast("管理者としてログインしました");
        loadHistory(); 
    }else{
        showToast("パスワードが違います", "error");
    }
}

// データ取得・表示
async function loadTotal(){
    if (!supabaseClient) return;
    try {
        const { data, error } = await supabaseClient
            .from("debt")
            .select("total")
            .eq("id", 1)
            .maybeSingle();

        if(error){
            console.error(error);
            document.getElementById("amountSpan").innerText = "エラー";
            return;
        }

        if (!data) {
            document.getElementById("amountSpan").style.fontSize = "16px";
            document.getElementById("amountSpan").innerHTML = "データ未作成<br><small style='color:#aaa;'>Supabaseのdebtテーブルに id:1, total:0 の行を追加してください</small>";
            return;
        }

        document.getElementById("amountSpan").innerText = `${Number(data.total).toLocaleString()}円`;
    } catch (e) {
        console.error(e);
    }
}

async function loadHistory(){
    if (!supabaseClient) return;
    try {
        const { data, error } = await supabaseClient
            .from("history")
            .select("*")
            .order("date", { ascending: false });

        if(error){
            console.error(error);
            return;
        }

        let html = "";
        for(const row of data){
            let actionTdContent = "-";

            if (isAdminLoggedIn) {
                const payButton = !row.is_paid 
                    ? `<button style="padding:6px 12px; font-size:13px;" onclick="markPaid('${row.id}', ${row.amount})">返済済みにする</button>` 
                    : '';
                const deleteButton = `<button class="btn-danger" style="padding:6px 12px; font-size:13px; margin-left:5px;" onclick="deleteDebt('${row.id}', ${row.amount}, ${row.is_paid})">削除</button>`;
                
                actionTdContent = `${payButton} ${deleteButton}`.trim() || '-';
            }

            html += `
            <tr>
                <td>${row.date}</td>
                <td>${Number(row.amount).toLocaleString()}円</td>
                <td>${row.reason || ""}</td>
                <td>
                    ${row.is_paid ? '<span class="status-paid">返済済み</span>' : '<span class="status-unpaid">未返済</span>'}
                </td>
                <td>
                    ${actionTdContent}
                </td>
            </tr>`;
        }
        document.getElementById("historyBody").innerHTML = html;
    } catch (e) {
        console.error(e);
    }
}

// 借金追加
async function addDebt(){
    if (!supabaseClient) return;
    if (!isAdminLoggedIn) {
        showToast("権限がありません", "error");
        return;
    }
    const date = document.getElementById("dateInput").value;
    const amount = Number(document.getElementById("amountInput").value);
    const reason = document.getElementById("reasonInput").value;

    if(!date || !amount || !reason){
        showToast("すべての項目を入力してください", "error");
        return;
    }

    const { error: insertError } = await supabaseClient
        .from("history")
        .insert([{ date, amount, reason, is_paid: false }]);

    if(insertError){
        showToast("追加失敗: " + insertError.message, "error");
        return;
    }

    const { data: debtRow } = await supabaseClient.from("debt").select("total").eq("id", 1).single();
    await supabaseClient.from("debt").update({ total: Number(debtRow.total) + amount }).eq("id", 1);

    document.getElementById("amountInput").value = "";
    document.getElementById("reasonInput").value = "";

    await loadTotal();
    await loadHistory();
    showToast("データを追加しました");
}

// 返済完了処理
async function markPaid(historyId, amount){
    if (!supabaseClient) return;
    if (!isAdminLoggedIn) {
        showToast("権限がありません", "error");
        return;
    }
    
    const confirmed = await showCustomConfirm("この項目を返済済みにしますか？", false);
    if(!confirmed) return;

    await supabaseClient.from("history").update({ is_paid: true }).eq("id", historyId);
    const { data: debtRow } = await supabaseClient.from("debt").select("total").eq("id", 1).single();

    await supabaseClient
        .from("debt")
        .update({ total: Math.max(0, Number(debtRow.total) - Number(amount)) })
        .eq("id", 1);

    await loadTotal();
    await loadHistory();
    showToast("返済済みに更新しました");
}

// 削除処理 (管理者用)
async function deleteDebt(historyId, amount, isPaid){
    if (!supabaseClient) return;
    if (!isAdminLoggedIn) {
        showToast("権限がありません", "error");
        return;
    }

    const confirmed = await showCustomConfirm("本当にこのデータを完全に削除しますか？\n（※未返済データの場合、総額からも差し引かれます）", true);
    if (!confirmed) return;

    const { error: deleteError } = await supabaseClient
        .from("history")
        .delete()
        .eq("id", historyId);

    if (deleteError) {
        showToast("削除に失敗しました: " + deleteError.message, "error");
        return;
    }

    if (!isPaid) {
        const { data: debtRow } = await supabaseClient.from("debt").select("total").eq("id", 1).single();
        await supabaseClient
            .from("debt")
            .update({ total: Math.max(0, Number(debtRow.total) - Number(amount)) })
            .eq("id", 1);
    }

    await loadTotal();
    await loadHistory();
    showToast("データを削除しました");
}

// エントリーポイント
if (supabaseClient) {
    loadTotal();
    loadHistory();
    supabaseClient.channel("debt-realtime").on("postgres_changes", { event: "*", schema: "public", table: "debt" }, () => { loadTotal(); }).subscribe();
    supabaseClient.channel("history-realtime").on("postgres_changes", { event: "*", schema: "public", table: "history" }, () => { loadHistory(); }).subscribe();
}
</script>

</body>
</html>
