<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZJH借金カウンター</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg-color: #1a1e24;
    --panel-bg: #252b35;
    --text-color: #e2e8f0;
    --text-muted: #94a3b8;
    --accent-color: #6366f1;
    --accent-hover: #4f46e5;
    --danger-color: #ef4444;
    --danger-hover: #dc2626;
    --success-color: #10b981;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box; 
}

body{
    background: var(--bg-color);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden; 
}

.container{
    max-width: 800px;
    margin: 40px auto;
    width: 100%;
}

h1{
    text-align: center;
    font-size: 1.8rem;
    color: var(--text-color);
    margin-bottom: 30px;
    font-weight: 600;
    letter-spacing: 0.05em;
}

h2 {
    font-size: 1.3rem;
    margin-bottom: 20px;
    color: var(--text-color);
    border-left: 4px solid var(--accent-color);
    padding-left: 10px;
}

#totalDisplay{
    text-align: center;
    background: var(--panel-bg);
    padding: 40px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    margin-bottom: 30px;
}

.total-label {
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-bottom: 15px;
    display: block;
}

.total-amount {
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    font-weight: 800;
    color: var(--text-color);
    line-height: 1.2;
    word-break: break-all;
}

/* ボタン共通設定 */
button{
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    background: var(--accent-color);
    color: #fff;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    max-width: 100%;
}

button:hover{
    background: var(--accent-hover);
    transform: translateY(-1px);
}

button.btn-secondary {
    background: #38414f;
    color: var(--text-color);
}
button.btn-secondary:hover {
    background: #475366;
}

button.btn-danger {
    background: var(--danger-color);
}
button.btn-danger:hover {
    background: var(--danger-hover);
}

.button-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap; 
}

/* 入力欄設定 */
input, select{
    width: 100%;
    max-width: 100%;
    padding: 14px;
    margin: 10px 0 20px 0;
    border: 2px solid #38414f;
    border-radius: 12px;
    font-size: 16px;
    background: #1a1e24;
    color: #fff;
    transition: border-color 0.2s;
    display: block;
}

input[type="date"] {
    appearance: none;
    -webkit-appearance: none;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--accent-color);
}

/* パネル設定 */
.panel{
    background: var(--panel-bg);
    border-radius: 20px;
    padding: 30px;
    margin-top: 20px;
    margin-bottom: 40px; 
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

#adminControls{
    display: none;
    margin-top: 30px;
    padding-top: 30px;
    border-top: 1px solid #38414f;
}

/* テーブル設計 */
.history-container{
    margin-top: 15px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #38414f;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th, td{
    padding: 16px;
    text-align: left;
    font-size: 15px;
}

th {
    background: #1a1e24;
    color: var(--text-muted);
    font-weight: 600;
}

tr {
    border-bottom: 1px solid #38414f;
}

tr:last-child {
    border-bottom: none;
}

.amount-debt {
    color: var(--danger-color);
    font-weight: 600;
}

.amount-repay {
    color: var(--success-color);
    font-weight: 600;
}

.action-buttons-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

/* 自作カスタム確認ダイアログ(モーダル) */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}
.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}
.modal-box {
    background: var(--panel-bg);
    padding: 30px;
    border-radius: 20px;
    max-width: 450px;
    width: 90%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.2s ease;
}
.modal-overlay.active .modal-box {
    transform: translateY(0);
}
.modal-text {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 25px;
    white-space: pre-wrap;
}
.modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
}

/* 🌟 トースト通知：物理的な画面に対して完全固定 🌟 */
.toast-container {
    position: fixed;
    top: -100px; 
    left: 50%;
    transform: translateX(-50%); 
    background: #2e3846;
    color: #fff;
    padding: 16px 32px;       
    border-radius: 50px;
    font-size: 16px;          
    font-weight: 700;          
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
    z-index: 2147483647 !important; 
    opacity: 0;
    pointer-events: none;
    transition: top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    border: 2px solid #475569; 
    text-align: center;
    min-width: 280px;
    max-width: 90%; 
}

.toast-container.active {
    top: 20px;
    opacity: 1;
}

/* スマートフォン向けの完全レスポンシブ調整 */
@media(max-width: 650px) {
    body { padding: 16px 12px; }
    .container { margin: 10px auto; }
    
    .panel { 
        padding: 24px 16px; 
        margin-top: 15px; 
        margin-bottom: 30px; 
    }
    
    table, thead, tbody, th, td, tr { 
        display: block; 
    }
    thead tr { 
        position: absolute; 
        top: -9999px; 
        left: -9999px; 
    }
    tr { 
        border: 1px solid #38414f; 
        border-radius: 12px; 
        margin-bottom: 16px; 
        padding: 12px;
        background: #1a1e24;
    }
    td { 
        border: none;
        position: relative;
        padding-left: 30%; 
        text-align: right;  
        padding-top: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid #252b35;
        min-height: 45px;
        word-break: break-all;
    }
    td:last-child {
        border-bottom: none;
        padding-bottom: 4px;
    }
    td:before { 
        position: absolute;
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
        width: 25%; 
        white-space: nowrap;
        text-align: left;
        font-weight: 600;
        color: var(--text-muted);
    }
    /* カラム名変更に合わせたレスポンシブ対応 */
    td:nth-of-type(1):before { content: "日付"; }
    td:nth-of-type(2):before { content: "収支"; }
    td:nth-of-type(3):before { content: "残高"; }
    td:nth-of-type(4):before { content: "用途"; }
    td:nth-of-type(5):before { content: "操作"; }
    
    td .action-buttons-wrap {
        display: flex;
        flex-direction: column; 
        width: 100%;
        gap: 10px;
        margin-top: 6px;
    }
    td button {
        width: 100%; 
        margin: 0;
        padding: 12px; 
        font-size: 14px;
        justify-content: center;
    }
    
    .button-group button {
        width: 100%; 
    }

    .modal-buttons {
        flex-direction: column-reverse; 
    }
    .modal-buttons button {
        width: 100%;
    }
    
    .toast-container {
        font-size: 15px;
        padding: 14px 24px;
        min-width: auto;
    }
    .toast-container.active {
        top: 15px; 
    }
}
</style>
</head>
<body>

<div id="toast" class="toast-container"></div>

<div class="container">

    <h1>ZJH借金カウンター</h1>

    <div id="totalDisplay">
        <span class="total-label">現在の全体の収支は</span>
        <span class="total-amount" id="amountSpan">読み込み中...</span>
    </div>

    <div class="button-group">
        <button class="btn-secondary" onclick="toggleHistory()">内訳確認</button>
        <button class="btn-secondary" onclick="toggleAdmin()">管理者モード</button>
    </div>

    <div id="historyPanel" class="panel" style="display: none;">
        <h2>内訳一覧（通帳形式）</h2>
        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>収支</th>
                        <th>残高</th>
                        <th>用途</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="panel" style="display: none;">
        <h2>管理者ログイン</h2>
        <input type="password" id="adminPassword" placeholder="パスワードを入力してください">
        <button onclick="loginAdmin()">ログイン</button>

        <div id="adminControls">
            <h2>データ追加</h2>
            
            <label style="color:var(--text-muted);">種類</label>
            <select id="typeInput">
                <option value="debt">借金 (残高が増える)</option>
                <option value="repay">返却 (残高が減る)</option>
            </select>

            <label style="color:var(--text-muted);">日付 <span style="color:var(--danger-color);">*必須</span></label>
            <input type="date" id="dateInput">
            
            <label style="color:var(--text-muted);">金額 (円) <span style="color:var(--danger-color);">*必須(正の整数)</span></label>
            <input type="number" id="amountInput" placeholder="例: 5000" min="1">
            
            <label style="color:var(--text-muted);">用途 <span id="reasonRequiredLabel" style="color:var(--danger-color);">*借金時は必須</span></label>
            <input type="text" id="reasonInput" placeholder="例: クレーンゲーム代、自転車の駐輪代">
            
            <button onclick="addTransaction()" style="width: 100%;">この内容で保存する</button>
        </div>
    </div>

</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <div id="modalText" class="modal-text"></div>
        <div class="modal-buttons">
            <button id="modalCancelBtn" class="btn-secondary">キャンセル</button>
            <button id="modalConfirmBtn">確定</button>
        </div>
    </div>
</div>

<script>
if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
}

function resetPageOnLoad() {
    window.scrollTo(0, 0); 
    
    const historyPanel = document.getElementById("historyPanel");
    const adminPanel = document.getElementById("adminPanel");
    if (historyPanel) historyPanel.style.display = "none";
    if (adminPanel) adminPanel.style.display = "none";
}

window.addEventListener('beforeunload', resetPageOnLoad);
window.addEventListener('load', () => {
    resetPageOnLoad();
    setTimeout(resetPageOnLoad, 0);
});

// 種別によって用途の必須ラベルの表示を切り替える
document.getElementById('typeInput').addEventListener('change', function(e) {
    const label = document.getElementById('reasonRequiredLabel');
    if(e.target.value === 'debt') {
        label.style.display = 'inline';
    } else {
        label.style.display = 'none';
    }
});

// --- configuration ---
const CONFIG_URL = "https://cjbwqutwvymejgsdnjzf.supabase.co";
const CONFIG_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqYndxdXR3dnltZWpnc2RuanpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTgyMjIsImV4cCI6MjA5NjM3NDIyMn0.C20QTlycDBvgfMjwAGaPQ1VLhlPj0iGA3C3xYi463bs";
const ADMIN_PASSWORD = "zjhkanekaesanai";

let supabaseClient = null;
let isAdminLoggedIn = false; 

try {
    if (window.supabase && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(CONFIG_URL, CONFIG_KEY);
    } else {
        document.getElementById("amountSpan").innerText = "エラー";
    }
} catch (e) {
    console.error("Supabase初期化エラー:", e);
}

function showCustomConfirm(message, isDangerAction = false) {
    return new Promise((resolve) => {
        const modal = document.getElementById("customModal");
        const textZone = document.getElementById("modalText");
        const confirmBtn = document.getElementById("modalConfirmBtn");
        const cancelBtn = document.getElementById("modalCancelBtn");

        textZone.innerText = message;
        confirmBtn.className = isDangerAction ? "btn-danger" : "";
        modal.classList.add("active");

        const cleanup = (result) => {
            modal.classList.remove("active");
            confirmBtn.onclick = null;
            cancelBtn.onclick = null;
            resolve(result);
        };

        confirmBtn.onclick = () => cleanup(true);
        cancelBtn.onclick = () => cleanup(false);
    });
}

function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    
    if(type === "error") {
        toast.style.borderColor = "var(--danger-color)";
        toast.style.color = "var(--danger-color)";
        toast.style.background = "#3d2429"; 
    } else {
        toast.style.borderColor = "var(--success-color)";
        toast.style.color = "var(--success-color)";
        toast.style.background = "#1e3129"; 
    }

    toast.classList.add("active");

    setTimeout(() => {
        toast.classList.remove("active");
    }, 2500); 
}

function toggleHistory(){
    const panel = document.getElementById("historyPanel");
    if(!panel) return;
    const isBlock = window.getComputedStyle(panel).display === "block";
    panel.style.display = isBlock ? "none" : "block";
    if(!isBlock) {
        loadHistory();
    }
}

function toggleAdmin(){
    const panel = document.getElementById("adminPanel");
    if(!panel) return;
    const isBlock = window.getComputedStyle(panel).display === "block";
    panel.style.display = isBlock ? "none" : "block";
}

function loginAdmin(){
    const pass = document.getElementById("adminPassword").value;
    if(pass === ADMIN_PASSWORD){
        isAdminLoggedIn = true;
        document.getElementById("adminControls").style.display = "block";
        showToast("管理者としてログインしました");
        loadHistory(); 
    }else{
        showToast("パスワードが違います", "error");
    }
}

async function loadTotal(){
    if (!supabaseClient) return;
    try {
        const { data, error } = await supabaseClient
            .from("debt")
            .select("total")
            .eq("id", 1)
            .maybeSingle();

        if(error){
            console.error(error);
            document.getElementById("amountSpan").innerText = "エラー";
            return;
        }

        if (!data) {
            document.getElementById("amountSpan").style.fontSize = "16px";
            document.getElementById("amountSpan").innerHTML = "データ未作成<br><small style='color:#aaa;'>Supabaseのdebtテーブルに id:1, total:0 の行を追加してください</small>";
            return;
        }

        document.getElementById("amountSpan").innerText = `${Number(data.total).toLocaleString()}円`;
    } catch (e) {
        console.error(e);
    }
}

async function loadHistory(){
    if (!supabaseClient) return;
    try {
        // 通帳のように残高を計算するため、古い順（昇順）で全データ取得
        const { data, error } = await supabaseClient
            .from("history")
            .select("*")
            .order("date", { ascending: true })
            .order("id", { ascending: true });

        if(error){
            console.error(error);
            return;
        }

        // JS側でその時点の残高を計算する
        let currentTotal = 0;
        const processedData = data.map(row => {
            currentTotal += Number(row.amount);
            return {
                ...row,
                runningBalance: currentTotal
            };
        });

        // 表示時は新しいものが上に来るように配列を反転させる
        processedData.reverse();

        let html = "";
        for(const row of processedData){
            let actionTdContent = "-";

            if (isAdminLoggedIn) {
                const deleteButton = `<button class="btn-danger" onclick="deleteTransaction('${row.id}', ${row.amount})">削除</button>`;
                actionTdContent = `<div class="action-buttons-wrap">${deleteButton}</div>`;
            }

            const isDebt = Number(row.amount) > 0;
            const amountClass = isDebt ? "amount-debt" : "amount-repay";
            const amountPrefix = isDebt ? "+" : "";

            html += `
            <tr>
                <td>${row.date}</td>
                <td><span class="${amountClass}">${amountPrefix}${Number(row.amount).toLocaleString()}円</span></td>
                <td>${Number(row.runningBalance).toLocaleString()}円</td>
                <td>${row.reason || "-"}</td>
                <td>${actionTdContent}</td>
            </tr>`;
        }
        document.getElementById("historyBody").innerHTML = html;
    } catch (e) {
        console.error(e);
    }
}

async function addTransaction(){
    if (!supabaseClient) return;
    if (!isAdminLoggedIn) {
        showToast("権限がありません", "error");
        return;
    }

    const type = document.getElementById("typeInput").value;
    const date = document.getElementById("dateInput").value;
    const rawAmount = Number(document.getElementById("amountInput").value);
    const reason = document.getElementById("reasonInput").value;

    // バリデーション
    if (!date) {
        showToast("日付を入力してください", "error");
        return;
    }
    if (!rawAmount || rawAmount <= 0) {
        showToast("金額には正の整数を入力してください", "error");
        return;
    }
    if (type === "debt" && !reason.trim()) {
        showToast("借金の場合は用途を入力してください", "error");
        return;
    }

    // 返却ならマイナスの値にする
    const finalAmount = type === "debt" ? rawAmount : -rawAmount;

    // is_paid は除外し、amountに収支を記録
    const { error: insertError } = await supabaseClient
        .from("history")
        .insert([{ date, amount: finalAmount, reason }]);

    if(insertError){
        showToast("追加失敗: " + insertError.message, "error");
        return;
    }

    const { data: debtRow } = await supabaseClient.from("debt").select("total").eq("id", 1).single();
    await supabaseClient.from("debt").update({ total: Number(debtRow.total) + finalAmount }).eq("id", 1);

    document.getElementById("amountInput").value = "";
    document.getElementById("reasonInput").value = "";
    if(type === "repay") {
        document.getElementById("typeInput").value = "debt"; // デフォルトに戻す
        document.getElementById('reasonRequiredLabel').style.display = 'inline';
    }

    await loadTotal();
    await loadHistory();
    showToast("データを追加しました");
}

async function deleteTransaction(historyId, amount){
    if (!supabaseClient) return;
    if (!isAdminLoggedIn) {
        showToast("権限がありません", "error");
        return;
    }

    const confirmed = await showCustomConfirm("本当にこのデータを完全に削除しますか？\n（※全体の収支も自動的に再計算されます）", true);
    if (!confirmed) return;

    const { error: deleteError } = await supabaseClient
        .from("history")
        .delete()
        .eq("id", historyId);

    if (deleteError) {
        showToast("削除に失敗しました: " + deleteError.message, "error");
        return;
    }

    const { data: debtRow } = await supabaseClient.from("debt").select("total").eq("id", 1).single();
    
    // 消した金額分を逆算（借金(プラス)を消したらマイナス、返却(マイナス)を消したらプラスになる）
    await supabaseClient
        .from("debt")
        .update({ total: Number(debtRow.total) - Number(amount) })
        .eq("id", 1);

    await loadTotal();
    await loadHistory();
    showToast("データを削除しました");
}

// エントリーポイント
if (supabaseClient) {
    loadTotal();
    loadHistory();
    supabaseClient.channel("debt-realtime").on("postgres_changes", { event: "*", schema: "public", table: "debt" }, () => { loadTotal(); }).subscribe();
    supabaseClient.channel("history-realtime").on("postgres_changes", { event: "*", schema: "public", table: "history" }, () => { loadHistory(); }).subscribe();
}
</script>

</body>
</html>
